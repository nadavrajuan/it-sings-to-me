services:
  it-sings-to-me:
    image: nginx:1.27-alpine
    container_name: it-sings-to-me
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.it-sings-to-me.rule=Host(`workflow.withnadav.com`) && PathPrefix(`/sing-to-me`)
      - traefik.http.routers.it-sings-to-me.entrypoints=websecure
      - traefik.http.routers.it-sings-to-me.priority=10
      - traefik.http.routers.it-sings-to-me.tls=true
      - traefik.http.routers.it-sings-to-me.tls.certresolver=letsencrypt
      - traefik.http.routers.it-sings-to-me-health.rule=Host(`workflow.withnadav.com`) && Path(`/sing-to-me/health`)
      - traefik.http.routers.it-sings-to-me-health.entrypoints=websecure
      - traefik.http.routers.it-sings-to-me-health.priority=100
      - traefik.http.routers.it-sings-to-me-health.tls=true
      - traefik.http.routers.it-sings-to-me-health.tls.certresolver=letsencrypt
      - traefik.http.routers.it-sings-to-me-health.service=it-sings-to-me
      - traefik.http.services.it-sings-to-me.loadbalancer.server.port=80

networks:
  traefik:
    external: true
    name: traefik-public
