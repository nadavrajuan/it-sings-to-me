name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: it-sings-to-me-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build interactive app for production path
        run: npm run build:interactive:prod

      - name: Validate production compose file
        run: docker compose -f docker-compose.prod.yml config

      - name: Stage static deploy bundle
        run: |
          mkdir -p /tmp/it-sings-to-me-release
          cp -R interactive/dist /tmp/it-sings-to-me-release/dist
          cp docker-compose.prod.yml /tmp/it-sings-to-me-release/docker-compose.prod.yml
          cp nginx.conf /tmp/it-sings-to-me-release/nginx.conf

      - name: Upload static deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: it-sings-to-me-static
          path: /tmp/it-sings-to-me-release
          if-no-files-found: error

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Download static deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: it-sings-to-me-static
          path: /tmp/it-sings-to-me-release

      - name: Package release
        run: |
          tar -czf /tmp/it-sings-to-me.tgz -C /tmp/it-sings-to-me-release .

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          scp /tmp/it-sings-to-me.tgz ubuntu@${{ secrets.SERVER_IP }}:/tmp/it-sings-to-me.tgz

      - name: Deploy on server
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "mkdir -p /tmp/it-sings-to-me-release"
          ssh ubuntu@${{ secrets.SERVER_IP }} "rm -rf /tmp/it-sings-to-me-release/*"
          ssh ubuntu@${{ secrets.SERVER_IP }} "tar -xzf /tmp/it-sings-to-me.tgz -C /tmp/it-sings-to-me-release"
          ssh ubuntu@${{ secrets.SERVER_IP }} "sudo mkdir -p /opt/apps/it-sings-to-me && sudo rsync -a --delete /tmp/it-sings-to-me-release/ /opt/apps/it-sings-to-me/ && sudo rm -f /opt/apps/it-sings-to-me/.env.production && sudo chown -R ubuntu:ubuntu /opt/apps/it-sings-to-me"
          ssh ubuntu@${{ secrets.SERVER_IP }} "cd /opt/apps/it-sings-to-me && sudo docker compose -f docker-compose.prod.yml up -d && sudo docker image prune -f"

      - name: Verify deployment health
        run: |
          for i in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://workflow.withnadav.com/sing-to-me/health || true)
            if [ "$status" = "200" ]; then
              echo "Deployment is healthy"
              exit 0
            fi
            echo "Attempt $i returned HTTP $status; retrying in 5s"
            sleep 5
          done
          exit 1
