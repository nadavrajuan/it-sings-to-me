name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: it-sings-to-me-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build interactive app
        run: npm run build:interactive

      - name: Build production container
        run: docker build -t it-sings-to-me:ci .

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package release
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude='*/node_modules' \
            --exclude=interactive/dist \
            --exclude=remotion/out \
            --exclude=public/assets/audio \
            --exclude=public/assets/video \
            -czf /tmp/it-sings-to-me.tgz .

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          scp /tmp/it-sings-to-me.tgz ubuntu@${{ secrets.SERVER_IP }}:/tmp/it-sings-to-me.tgz

      - name: Write deployment env file
        env:
          BASIC_AUTH_USERS: ${{ secrets.BASIC_AUTH_USERS }}
        run: |
          {
            printf '%s\n' 'TRAEFIK_HOST=workflow.withnadav.com'
            printf '%s\n' 'TRAEFIK_DOCKER_NETWORK=traefik-public'
            printf '%s\n' 'TRAEFIK_ENTRYPOINTS=websecure'
            printf '%s\n' 'TRAEFIK_CERT_RESOLVER=letsencrypt'
            printf '%s\n' "BASIC_AUTH_USERS=$BASIC_AUTH_USERS"
          } > /tmp/it-sings-to-me.env.production

      - name: Upload deployment env file
        run: |
          scp /tmp/it-sings-to-me.env.production ubuntu@${{ secrets.SERVER_IP }}:/tmp/it-sings-to-me.env.production

      - name: Deploy on server
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "mkdir -p /tmp/it-sings-to-me-release"
          ssh ubuntu@${{ secrets.SERVER_IP }} "rm -rf /tmp/it-sings-to-me-release/*"
          ssh ubuntu@${{ secrets.SERVER_IP }} "tar -xzf /tmp/it-sings-to-me.tgz -C /tmp/it-sings-to-me-release"
          ssh ubuntu@${{ secrets.SERVER_IP }} "sudo mkdir -p /opt/apps/it-sings-to-me && sudo rsync -a --delete --exclude '.env.production' /tmp/it-sings-to-me-release/ /opt/apps/it-sings-to-me/ && sudo chown -R ubuntu:ubuntu /opt/apps/it-sings-to-me"
          ssh ubuntu@${{ secrets.SERVER_IP }} "mv /tmp/it-sings-to-me.env.production /opt/apps/it-sings-to-me/.env.production"
          ssh ubuntu@${{ secrets.SERVER_IP }} "cd /opt/apps/it-sings-to-me && sudo docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build && sudo docker image prune -f"

      - name: Verify deployment health
        run: |
          for i in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://workflow.withnadav.com/health || true)
            if [ "$status" = "200" ]; then
              echo "Deployment is healthy"
              exit 0
            fi
            echo "Attempt $i returned HTTP $status; retrying in 5s"
            sleep 5
          done
          exit 1
