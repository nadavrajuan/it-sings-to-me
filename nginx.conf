server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /sing-to-me {
    return 301 /sing-to-me/;
  }

  location = /sing-to-me/health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location ^~ /sing-to-me/ {
    rewrite ^/sing-to-me/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
